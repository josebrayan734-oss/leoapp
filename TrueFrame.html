<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TrueFrame - Reportes y Configuración</title>
  <style>
    body{font-family:Segoe UI,Arial;background:#f4f6f8;padding:20px}
    .container{display:flex;gap:20px}
    .panel{background:#fff;border:1px solid #ddd;border-radius:6px;padding:16px;flex:1;box-shadow:0 1px 3px rgba(0,0,0,.04)}
    h2{margin:0 0 12px 0;font-size:18px}
    .row{margin-bottom:10px}
    label{display:block;font-size:13px;margin-bottom:4px}
    select,input,button{padding:8px;border:1px solid #cfcfcf;border-radius:4px;width:100%}
    button{cursor:pointer;background:#2b78e4;color:#fff;border:none}
    .small{display:flex;gap:8px}
    .log{margin-top:12px;padding:8px;background:#f9fafb;border-radius:4px;height:160px;overflow:auto;font-size:13px}
    .settings-modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:1000}
    .settings-modal.open{display:flex}
    .settings-card{background:#fff;width:min(960px,100%);max-height:85vh;overflow:auto;border-radius:8px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
    .settings-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .settings-section{border:1px solid #e5e7eb;border-radius:6px;padding:10px;background:#fafbfc}
    .settings-list{margin-top:8px;display:grid;gap:6px}
    .settings-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#fff;border:1px solid #eee;border-radius:4px}
    .settings-actions{display:flex;gap:6px}
    .settings-actions button{width:auto;padding:6px 8px}
    .settings-actions .secondary{background:#e3e8ef;color:#111}
  </style>
</head>
<body>
  <h1>TrueFrame - Reportes y Configuración</h1>
  <div class="row" style="display:flex;gap:8px;flex-wrap:wrap">
    <button id="printReport" style="width:auto;display:none">Exportar a PDF</button>
    <button id="openSettings" style="width:auto">Configuración</button>
  </div>
  <div class="container">
    <div class="panel" id="reportsPanel">
      <h2>Reportes</h2>
      <div class="row">
        <label for="reportType">Tipo de reporte</label>
        <select id="reportType">
          <option value="sales_by_day">Ventas por días</option>
          <option value="sales_by_product">Ventas por producto</option>
          <option value="general">Reporte general</option>
        </select>
      </div>
      <div class="row" id="dateRangeRow">
        <label>Rango de fechas</label>
        <div class="small">
          <input type="date" id="fromDate">
          <input type="date" id="toDate">
        </div>
      </div>
      <div class="row">
        <button id="generateReport">Generar reporte</button>
      </div>
      <div class="log" id="reportLog">Eventos de reporte...</div>
    </div>

    <div class="panel" id="configPanel">
      <h2>Configuración</h2>
      <div class="row">
        <button id="openSettingsPanel" style="width:auto">Abrir panel de configuración</button>
      </div>
      <div class="log" id="configLog">Eventos de configuración...</div>
    </div>
  </div>

  <div id="settingsModal" class="settings-modal" aria-hidden="true">
    <div class="settings-card">
      <div class="row" style="display:flex;justify-content:space-between;align-items:center">
        <h2>Configuración general</h2>
        <button id="closeSettings" style="width:auto">Cerrar</button>
      </div>
      <div class="settings-grid">
        <div class="settings-section">
          <h3>Usuarios</h3>
          <form id="user-form">
            <input type="hidden" id="user-id">
            <label>Usuario
              <input id="user-name" required>
            </label>
            <label>Contraseña
              <input id="user-password" required>
            </label>
            <div class="actions" style="margin-top:8px">
              <button type="submit" style="width:auto">Guardar usuario</button>
              <button type="button" id="cancel-user" class="secondary" style="width:auto">Cancelar</button>
            </div>
          </form>
          <div id="users-list" class="settings-list"></div>
        </div>
        <div class="settings-section">
          <h3>Categorías</h3>
          <form id="category-form">
            <input type="hidden" id="category-id">
            <label>Nombre
              <input id="category-name" required>
            </label>
            <div class="actions" style="margin-top:8px">
              <button type="submit" style="width:auto">Guardar categoría</button>
              <button type="button" id="cancel-category" class="secondary" style="width:auto">Cancelar</button>
            </div>
          </form>
          <div id="categories-list" class="settings-list"></div>
        </div>
        <div class="settings-section">
          <h3>Moneda</h3>
          <form id="currency-form">
            <label>Moneda
              <select id="currency-code">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="MXN">MXN</option>
                <option value="COP">COP</option>
              </select>
            </label>
            <label>Símbolo
              <input id="currency-symbol" value="$">
            </label>
            <div class="actions" style="margin-top:8px">
              <button type="submit" style="width:auto">Guardar moneda</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Clase que actúa como puente con MainFrame.html usando postMessage
    class MainFrameConnector {
      constructor(targetWindow = window.parent) {
        this.target = targetWindow;
        this.origin = '*'; // ajustar si conoce el origen exacto
        window.addEventListener('message', this._onMessage.bind(this));
        this._callbacks = {};
        this._id = 1;
      }

      _onMessage(evt){
        const msg = evt.data;
        if(!msg || !msg.__tf_id) return;
        const cb = this._callbacks[msg.__tf_id];
        if(cb) cb(msg.payload);
      }

      send(action, payload){
        return new Promise((resolve)=>{
          const id = (this._id++).toString();
          this._callbacks[id] = (resp)=>{ delete this._callbacks[id]; resolve(resp); };
          this.target.postMessage({ __tf_id: id, action, payload }, this.origin);
        });
      }
    }

    // Lógica para generar reportes usando el conector
    class ReportManager {
      constructor(connector, logEl){ this.conn = connector; this.logEl = logEl; }
      async generate(type, from, to){
        this._log('Solicitando reporte: '+type);
        const payload = { type, from, to };
        const resp = await this.conn.send('generate_report', payload);
        this._log('Respuesta: ' + JSON.stringify(resp));
        return resp;
      }
      _log(text){ this.logEl.textContent = (new Date()).toLocaleTimeString() + ' - ' + text + '\n' + this.logEl.textContent; }
    }

    // Lógica para configuración (usuarios, categorías y moneda)
    class ConfigManager {
      constructor(logEl){
        this.logEl = logEl;
        this.users = this.loadUsers();
        this.categories = this.loadCategories();
        this.currency = this.loadCurrency();
        this.userForm = document.getElementById('user-form');
        this.userIdInput = document.getElementById('user-id');
        this.userNameInput = document.getElementById('user-name');
        this.userPasswordInput = document.getElementById('user-password');
        this.usersList = document.getElementById('users-list');
        this.cancelUserButton = document.getElementById('cancel-user');
        this.categoryForm = document.getElementById('category-form');
        this.categoryIdInput = document.getElementById('category-id');
        this.categoryNameInput = document.getElementById('category-name');
        this.categoriesList = document.getElementById('categories-list');
        this.cancelCategoryButton = document.getElementById('cancel-category');
        this.currencyForm = document.getElementById('currency-form');
        this.currencyCodeInput = document.getElementById('currency-code');
        this.currencySymbolInput = document.getElementById('currency-symbol');
        this.bindEvents();
        this.render();
      }

      loadUsers(){
        try{ const data = JSON.parse(localStorage.getItem('leoapp-users') || '[]'); return Array.isArray(data) && data.length ? data : [{ id: 1, username: 'admin', password: '1234' }]; }
        catch{ return [{ id: 1, username: 'admin', password: '1234' }]; }
      }

      saveUsers(){ localStorage.setItem('leoapp-users', JSON.stringify(this.users)); }

      loadCategories(){
        try{ const data = JSON.parse(localStorage.getItem('leoapp-categories') || '[]'); return Array.isArray(data) && data.length ? data : [{ id: 1, name: 'Tecnología' }, { id: 2, name: 'Accesorios' }]; }
        catch{ return [{ id: 1, name: 'Tecnología' }, { id: 2, name: 'Accesorios' }]; }
      }

      saveCategories(){ localStorage.setItem('leoapp-categories', JSON.stringify(this.categories)); }

      loadCurrency(){
        try{ const data = JSON.parse(localStorage.getItem('leoapp-currency') || '{}'); return data && data.code ? data : { code: 'MXN', symbol: '$' }; }
        catch{ return { code: 'MXN', symbol: '$' }; }
      }

      saveCurrency(){ localStorage.setItem('leoapp-currency', JSON.stringify(this.currency)); }

      _log(text){ this.logEl.textContent = (new Date()).toLocaleTimeString() + ' - ' + text + '\n' + this.logEl.textContent; }

      bindEvents(){
        this.userForm.addEventListener('submit', (e)=>{ e.preventDefault(); this.saveUser(); });
        this.cancelUserButton.addEventListener('click', ()=> this.resetUserForm());
        this.categoryForm.addEventListener('submit', (e)=>{ e.preventDefault(); this.saveCategory(); });
        this.cancelCategoryButton.addEventListener('click', ()=> this.resetCategoryForm());
        this.currencyForm.addEventListener('submit', (e)=>{ e.preventDefault(); this.saveCurrencyConfig(); });
        this.usersList.addEventListener('click', (e)=>{ const button = e.target.closest('button'); if(!button) return; const id = Number(button.dataset.id); if(button.classList.contains('edit-user')) this.editUser(id); if(button.classList.contains('delete-user')) this.deleteUser(id); });
        this.categoriesList.addEventListener('click', (e)=>{ const button = e.target.closest('button'); if(!button) return; const id = Number(button.dataset.id); if(button.classList.contains('edit-category')) this.editCategory(id); if(button.classList.contains('delete-category')) this.deleteCategory(id); });
      }

      render(){
        this.renderUsers();
        this.renderCategories();
        this.renderCurrency();
      }

      renderUsers(){
        this.usersList.innerHTML = '';
        if(!this.users.length){ this.usersList.innerHTML = '<div class="empty">No hay usuarios.</div>'; return; }
        this.users.forEach(user => {
          const item = document.createElement('div');
          item.className = 'settings-item';
          item.innerHTML = `<span>${user.username} / ${user.password}</span><div class="settings-actions"><button type="button" class="edit-user secondary" data-id="${user.id}">Editar</button><button type="button" class="delete-user" data-id="${user.id}">Eliminar</button></div>`;
          this.usersList.appendChild(item);
        });
      }

      renderCategories(){
        this.categoriesList.innerHTML = '';
        if(!this.categories.length){ this.categoriesList.innerHTML = '<div class="empty">No hay categorías.</div>'; return; }
        this.categories.forEach(category => {
          const item = document.createElement('div');
          item.className = 'settings-item';
          item.innerHTML = `<span>${category.name}</span><div class="settings-actions"><button type="button" class="edit-category secondary" data-id="${category.id}">Editar</button><button type="button" class="delete-category" data-id="${category.id}">Eliminar</button></div>`;
          this.categoriesList.appendChild(item);
        });
      }

      renderCurrency(){
        this.currencyCodeInput.value = this.currency.code || 'MXN';
        this.currencySymbolInput.value = this.currency.symbol || '$';
      }

      saveUser(){
        const id = Number(this.userIdInput.value);
        const username = this.userNameInput.value.trim();
        const password = this.userPasswordInput.value.trim();
        if(!username || !password){ this._log('Completa usuario y contraseña'); return; }
        if(id){ this.users = this.users.map(user => user.id === id ? { ...user, username, password } : user); }
        else{ this.users.unshift({ id: Date.now(), username, password }); }
        this.saveUsers();
        this.renderUsers();
        this.resetUserForm();
        this._log('Usuario actualizado');
      }

      editUser(id){ const user = this.users.find(item => item.id === id); if(!user) return; this.userIdInput.value = user.id; this.userNameInput.value = user.username; this.userPasswordInput.value = user.password; }

      deleteUser(id){ this.users = this.users.filter(item => item.id !== id); this.saveUsers(); this.renderUsers(); this._log('Usuario eliminado'); }

      resetUserForm(){ this.userForm.reset(); this.userIdInput.value = ''; }

      saveCategory(){
        const id = Number(this.categoryIdInput.value);
        const name = this.categoryNameInput.value.trim();
        if(!name){ this._log('Ingresa un nombre de categoría'); return; }
        if(id){ this.categories = this.categories.map(category => category.id === id ? { ...category, name } : category); }
        else{ this.categories.unshift({ id: Date.now(), name }); }
        this.saveCategories();
        this.renderCategories();
        this.resetCategoryForm();
        this._log('Categoría actualizada');
      }

      editCategory(id){ const category = this.categories.find(item => item.id === id); if(!category) return; this.categoryIdInput.value = category.id; this.categoryNameInput.value = category.name; }

      deleteCategory(id){ this.categories = this.categories.filter(item => item.id !== id); this.saveCategories(); this.renderCategories(); this._log('Categoría eliminada'); }

      resetCategoryForm(){ this.categoryForm.reset(); this.categoryIdInput.value = ''; }

      saveCurrencyConfig(){
        this.currency = { code: this.currencyCodeInput.value, symbol: this.currencySymbolInput.value || '$' };
        this.saveCurrency();
        this._log('Moneda actualizada');
      }
    }

    function getStoredData() {
      const products = JSON.parse(localStorage.getItem('leoapp-products') || '[]');
      const clients = JSON.parse(localStorage.getItem('leoapp-clients') || '[]');
      const sales = JSON.parse(localStorage.getItem('leoapp-sales') || '[]');
      return { products, clients, sales };
    }

    function renderReport(data) {
      const totalProducts = data.products.length;
      const totalClients = data.clients.length;
      const totalSales = data.sales.length;
      const totalRevenue = data.sales.reduce((sum, sale) => sum + Number(sale.total || 0), 0);
      document.getElementById('reportLog').innerHTML = `
        <strong>Resumen</strong><br>
        Productos: ${totalProducts}<br>
        Clientes: ${totalClients}<br>
        Ventas: ${totalSales}<br>
        Ingresos: $${totalRevenue.toFixed(2)}
      `;
    }

    // Inicialización
    const connector = new MainFrameConnector(window.parent);
    const reportManager = new ReportManager(connector, document.getElementById('reportLog'));
    const configManager = new ConfigManager(document.getElementById('configLog'));

    const settingsModal = document.getElementById('settingsModal');
    document.getElementById('openSettings').addEventListener('click', ()=>{
      settingsModal.classList.add('open');
      settingsModal.setAttribute('aria-hidden', 'false');
    });
    document.getElementById('openSettingsPanel').addEventListener('click', ()=>{
      settingsModal.classList.add('open');
      settingsModal.setAttribute('aria-hidden', 'false');
    });
    document.getElementById('closeSettings').addEventListener('click', ()=>{
      settingsModal.classList.remove('open');
      settingsModal.setAttribute('aria-hidden', 'true');
    });
    settingsModal.addEventListener('click', (e)=>{ if(e.target === settingsModal){ settingsModal.classList.remove('open'); settingsModal.setAttribute('aria-hidden', 'true'); } });

    const params = new URLSearchParams(window.location.search);
    if (params.get('pdf') === '1') {
      document.getElementById('printReport').style.display = 'inline-block';
      document.getElementById('printReport').addEventListener('click', () => window.print());
    }

    renderReport(getStoredData());

    document.getElementById('reportType').addEventListener('change', (e)=>{
      const type = e.target.value;
      document.getElementById('dateRangeRow').style.display = (type === 'general') ? 'none' : 'block';
    });

    document.getElementById('generateReport').addEventListener('click', async ()=>{
      const type = document.getElementById('reportType').value;
      const from = document.getElementById('fromDate').value || null;
      const to = document.getElementById('toDate').value || null;
      await reportManager.generate(type, from, to);
    });

    // Mensajes de ejemplo que MainFrame.html debería manejar:
    // { action: 'generate_report', payload: {type, from, to} }
    // { action: 'save_config', payload: {...} }

  </script>
</body>
</html>
